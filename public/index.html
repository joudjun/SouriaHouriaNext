<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Expansion of the Universe</title>
        <style>
            body {
                margin: 0;
                background: black;
                color: white;
                font-family: Arial, sans-serif;
                overflow: hidden;
            }

            #controls {
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(0, 0, 0, 0.6);
                padding: 10px;
                border-radius: 8px;
            }

            input[type="range"] {
                width: 200px;
            }

            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="controls">
            <div>Expansion Rate</div>
            <input
                type="range"
                min="0"
                max="0.05"
                step="0.001"
                value="0.01"
                id="rate"
            />
        </div>

        <canvas id="canvas"></canvas>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let center = { x: canvas.width / 2, y: canvas.height / 2 };

            // Create galaxies
            let galaxies = [];
            for (let i = 0; i < 80; i++) {
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 200 + 20;

                galaxies.push({
                    angle,
                    distance,
                });
            }

            let expansionRate = 0.01;

            document.getElementById("rate").addEventListener("input", (e) => {
                expansionRate = parseFloat(e.target.value);
            });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw center reference point
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(center.x, center.y, 4, 0, Math.PI * 2);
                ctx.fill();

                galaxies.forEach((g) => {
                    // Expansion: distance increases over time
                    g.distance *= 1 + expansionRate;

                    let x = center.x + Math.cos(g.angle) * g.distance;
                    let y = center.y + Math.sin(g.angle) * g.distance;

                    // Draw galaxy
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });

                requestAnimationFrame(draw);
            }

            draw();

            // Resize handling
            window.addEventListener("resize", () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                center = { x: canvas.width / 2, y: canvas.height / 2 };
            });
        </script>
    </body>
</html>
